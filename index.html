<!DOCTYPE html>

<html>
<head>
    <title>Vampire Party</title>

__________________________
<style>
    body {
        background:
            radial-gradient(circle at 20% 30%, rgba(139,0,0,0.4), transparent 50%),
            radial-gradient(circle at 80% 70%, rgba(0,0,0,0.8), transparent 60%),
            linear-gradient(to bottom, #1a0000, #340606, #000000);

        color: white;
        font-family: "Times New Roman", serif;
        text-align: center;

        animation: bgMove 10s infinite alternate;
    }

    /* animasi background */
    @keyframes bgMove {
        0% { background-position: 0% 0%; }
        100% { background-position: 100% 100%; }
    }

    /* efek glow judul */
    h2 {
        animation: glow 2s infinite alternate;
    }

    @keyframes glow {
        from { text-shadow: 0 0 10px red; }
        to { text-shadow: 0 0 25px darkred; }
    }

    img {
        margin-top: 20px;
        border-radius: 15px;
        width: 300px;
    }

    .btn {
        display: inline-block;
        padding: 14px 28px;
        margin: 10px;
        border-radius: 30px;
        text-decoration: none;
        color: #f5f5f5;
        font-weight: bold;
        position: relative;
        overflow: hidden;
        background: #000;
    }

    /* animasi darah di tombol */
    .btn::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 30px;

        background:
            radial-gradient(circle at 25% 30%, #5a0000, transparent 50%),
            radial-gradient(circle at 75% 25%, #2b0000, transparent 50%),
            radial-gradient(circle at 60% 70%, #111111, transparent 60%),
            radial-gradient(circle at 30% 80%, #3a0000, transparent 50%),
            radial-gradient(circle at 80% 75%, #8c6b1f, transparent 50%);

        filter: blur(14px);
        opacity: 0.85;
        animation: bloodFlow 8s infinite alternate ease-in-out;
        z-index: 0;
    }

    .btn span {
        position: relative;
        z-index: 1;
    }

    @keyframes bloodFlow {
        0% { transform: scale(1) translate(0,0); }
        50% { transform: scale(1.2) translate(-15px, 10px); }
        100% { transform: scale(1) translate(15px, -10px); }
    }

    .btn:hover {
        transform: scale(1.07);
        box-shadow: 0 0 20px rgba(139, 0, 0, 0.7);
    }
</style>


</head>

<body>

<h2>ZILDA'S BIRTHDAY PARTY</h2>
<h3>October 22nd, 2026</h3>

<img src="f527844610269e63a08880d1ce987d34.jpg" alt="birthday cake">

<h3>🧛‍♀️PARTY RULES🧛‍♀️</h3>

<div style="display: flex; justify-content: center; gap: 40px;">


<div>
    <a href="#" class="btn"><span>Vampire dress code</span></a><br>
    <a href="#" class="btn"><span>Must wear fangs</span></a>
</div>

<div>
    <a href="#" class="btn"><span>Say "bleh bleh bleh"</span></a><br>
    <a href="#" class="btn"><span>Laugh like a villain</span></a>
</div>


</div>

<p>
<b>This is where you need to go:</b><br>
<a href="https://maps.google.com" target="_blank">
    Google map link
</a>
</p>

<audio id="music" autoplay loop muted>
    <source src="Toccata and Fugue in D Minor (Best Version Ever).mp3" type="audio/mpeg">
</audio>

<script>
document.addEventListener("click", function() {
    var music = document.getElementById("music");
    music.muted = false;
    music.play();
});
</script>

</body>
</html>
